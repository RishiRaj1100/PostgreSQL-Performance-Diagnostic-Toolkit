services:
  postgres:
    image: postgres:16-alpine
    container_name: diagnostic-postgres
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: dba
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Diagnostic@2026}
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c shared_buffers=256MB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
    # Runtime tuning for diagnostics and reproducible plan analysis.
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./procedures/diagnostics.sql:/docker-entrypoint-initdb.d/02_procs.sql
      - ./queries/optimisation_demo.sql:/docker-entrypoint-initdb.d/03_demo.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dba -d ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - diagnostic-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: diagnostic-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@diagnostic.local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-DiagnosticAdmin@2026}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "8081:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - diagnostic-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  diagnostic-network:
    driver: bridge
